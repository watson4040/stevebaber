<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & T Barber Lounge | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }
        /* --- Navbar (same as above) --- */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background-color: #0a0a0a;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
        }
        .logo span {
            color: #e6b422;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            font-weight: 500;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #e6b422;
        }
        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .hamburger {
                display: block;
            }
            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background-color: #0a0a0a;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding-top: 3rem;
                gap: 2rem;
                transition: left 0.3s ease;
            }
            .nav-links.active {
                left: 0;
            }
        }
        .gallery-section {
            padding: 4rem 5%;
        }
        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 3rem;
        }
        .section-title span {
            color: #e6b422;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .gallery-item {
            background-color: #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.02);
        }
        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .gallery-item p {
            padding: 1rem;
            text-align: center;
            font-weight: 500;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            background-color: #050505;
            margin-top: 3rem;
        }
        .btn-whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }
        .btn-whatsapp:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">S & T <span>Barber Lounge</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="gallery-section">
        <h2 class="section-title">Our <span>Style Gallery</span></h2>
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="https://images.pexels.com/photos/3997822/pexels-photo-3997822.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Skin Fade">
                <p>Precision Skin Fade</p>
            </div>
            <div class="gallery-item">
                <img src="https://images.pexels.com/photos/3993449/pexels-photo-3993449.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Beard Sculpt">
                <p>Beard Sculpting</p>
            </div>
            <div class="gallery-item">
                <img src="https://images.pexels.com/photos/3993463/pexels-photo-3993463.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Hot Towel">
                <p>Hot Towel Shave</p>
            </div>
            <div class="gallery-item">
                <img src="https://images.pexels.com/photos/3993460/pexels-photo-3993460.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Kids Cut">
                <p>Kids Cut</p>
            </div>
            <div class="gallery-item">
                <img src="https://images.pexels.com/photos/3812900/pexels-photo-3812900.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Accessories">
                <p>Accessories Display</p>
            </div>
            <div class="gallery-item">
                <img src="https://images.pexels.com/photos/3823716/pexels-photo-3823716.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Lounge">
                <p>The Lounge Vibe</p>
            </div>
        </div>
    </div>

    <a href="https://wa.me/260573420800" class="btn-whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <div class="footer">
        <p>&copy; 2025 S & T Barber Lounge & Accessories. All rights reserved.</p>
    </div>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => {
            navLinks.classList.toggle('active');
        });
    </script>
</body>
</html>
