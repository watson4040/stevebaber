<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S & T Barber Lounge | Contact & Book</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.6;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            background-color: #0a0a0a;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-size: 1.8rem; font-weight: 800; }
        .logo span { color: #e6b422; }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        .nav-links a {
            font-weight: 500;
            transition: color 0.3s ease;
            text-decoration: none;
            color: white;
        }
        .nav-links a:hover { color: #e6b422; }
        .hamburger {
            display: none;
            font-size: 1.8rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 70px);
                background-color: #0a0a0a;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding-top: 3rem;
                gap: 2rem;
                transition: left 0.3s ease;
                z-index: 999;
            }
            .nav-links.active { left: 0; }
        }
        .contact-section {
            padding: 4rem 5%;
            max-width: 1000px;
            margin: 0 auto;
        }
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .section-title span { color: #e6b422; }
        .booking-form {
            background-color: #1a1a1a;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 3rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 30px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }
        select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23e6b422" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 16px;
            cursor: pointer;
            line-height: 1.5;
        }
        .btn-submit {
            background-color: #e6b422;
            color: #0a0a0a;
            font-weight: bold;
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            font-size: 1.1rem;
        }
        .btn-submit:hover {
            background-color: #ffffff;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .map-container {
            margin-top: 2rem;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #333;
        }
        iframe {
            width: 100%;
            height: 350px;
            border: 0;
        }
        .footer {
            text-align: center;
            padding: 2rem;
            background-color: #050505;
            margin-top: 3rem;
        }
        .btn-whatsapp {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            transition: transform 0.3s;
            text-decoration: none;
        }
        .btn-whatsapp:hover { transform: scale(1.1); }
        @media (max-width: 768px) {
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">S & T <span>Barber Lounge</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <div class="contact-section">
        <h2 class="section-title">Book Your <span>Spot</span></h2>
        <div class="booking-form">
            <form id="contactForm">
                <div class="form-group"><input type="text" name="name" placeholder="Your Name" required></div>
                <div class="form-group"><input type="tel" name="phone" placeholder="WhatsApp Number" required></div>
                <div class="form-group"><input type="date" name="date" required></div>
                <div class="form-group"><input type="time" name="time" required></div>
                <div class="form-group">
                    <select name="service" required>
                        <option value="" disabled selected>Select a service</option>
                        <option>Classic Haircut (K100)</option>
                        <option>Fade & Design (K120)</option>
                        <option>Beard Trim (K70)</option>
                        <option>Kids Cut (K80)</option>
                        <option>Hot Towel Shave (K90)</option>
                        <option>Accessories Consultation</option>
                    </select>
                </div>
                <div class="form-group"><textarea name="requests" rows="3" placeholder="Special requests (e.g., fade style)"></textarea></div>
                <button type="submit" class="btn-submit">Book Now via WhatsApp</button>
            </form>
        </div>

        <h2 class="section-title">Our <span>Location</span></h2>
        <div class="map-container">
            <!-- ⚠️ REPLACE THE IFRAME BELOW WITH YOUR OWN EMBED CODE FROM GOOGLE MAPS ⚠️ -->
            <!-- 1. Open your link: https://maps.app.goo.gl/pMmouUgsbZpwAbhc7 -->
            <!-- 2. Click Share → Embed a map → Copy the entire iframe code -->
            <!-- 3. Paste it here, replacing this entire <iframe> block -->
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3846.9963499905625!2d28.187715073908535!3d-15.376684012805882!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1940f700591f28a3%3A0x664f1354ae51eec5!2sS%20%26%20T%20Baber%20Lounge%20and%20Accessories!5e0!3m2!1sen!2szm!4v1778323821569!5m2!1sen!2szm" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <p style="text-align: center; margin-top: 1rem; color: #ccc;">📍 S & T Barber Lounge and Accessories – J5FR+84F Chilanga, Lusaka West</p>
    </div>

    <a href="https://wa.me/260573420800" class="btn-whatsapp" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <div class="footer">
        <p>&copy; 2025 S & T Barber Lounge & Accessories. All rights reserved.</p>
    </div>

    <script>
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => navLinks.classList.toggle('active'));

        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = form.querySelector('input[name="name"]').value;
            const phone = form.querySelector('input[name="phone"]').value;
            const date = form.querySelector('input[name="date"]').value;
            const time = form.querySelector('input[name="time"]').value;
            const service = form.querySelector('select[name="service"]').value;
            const requests = form.querySelector('textarea[name="requests"]').value;
            const msg = `Hello S&T Barber Lounge, I'd like to book an appointment.%0A%0AName: ${name}%0APhone: ${phone}%0ADate: ${date}%0ATime: ${time}%0AService: ${service}%0ASpecial requests: ${requests}`;
            window.open(`https://wa.me/260973420800?text=${msg}`, '_blank');
        });
    </script>
</body>
</html>
